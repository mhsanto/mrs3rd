<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>VIP Reward Floating Button</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <main class="stage">
        <div class="stage-inner">
            <h1 class="stage-title">VIP Reward Floating Button</h1>
            <p class="stage-hint">A glowing, bobbing CTA — drifts from right-middle to right-bottom along the edge of the screen.</p>
        </div>
    </main>

    <div class="vip-fab-wrap" aria-hidden="false">
        <a
            class="vip-fab"
            href="../vip%20reward/VIP%20Reward%20v2.html"
            aria-label="Open VIP Reward System">
            <span class="vip-fab-aura" aria-hidden="true"></span>
            <span class="vip-fab-rings" aria-hidden="true">
                <span class="ring ring-1"></span>
                <span class="ring ring-2"></span>
                <span class="ring ring-3"></span>
            </span>
            <span class="vip-fab-image-wrap">
                <img
                    src="../floatingButton/assets/mascot.png"
                    alt=""
                    class="vip-fab-image" />
                <span class="vip-fab-sparkle vip-fab-sparkle-1" aria-hidden="true">✦</span>
                <span class="vip-fab-sparkle vip-fab-sparkle-2" aria-hidden="true">✧</span>
                <span class="vip-fab-sparkle vip-fab-sparkle-3" aria-hidden="true">✦</span>
            </span>
            <span class="vip-fab-label">
                <span class="vip-fab-label-text">VIP Reward System</span>
            </span>
        </a>
    </div>
</body>
</html>
